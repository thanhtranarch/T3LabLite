title: "Mana\nAnno"
tooltip: Unified tool to Find, Remove and Rename Dimensions and Text Notes (Collab with DQT)
description: |
  Annotation Manager consolidates all Dimension and Text Note tools
  into one window with switchable tabs. Developed in collaboration with Dang Quoc Truong.

  Dimension tab:
  - Find dimensions by type name keyword -> jump to view
  - Delete selected dimension instances
  - Auto-rename all DimensionTypes by properties

  Text Note tab:
  - Find Notes: search text notes by content -> jump to view
  - Find Types: search TextNoteTypes by name -> delete types
  - Auto-rename all TextNoteTypes by properties

author: Tran Tien Thanh & Dang Quoc Truong
version: 1.1.0
