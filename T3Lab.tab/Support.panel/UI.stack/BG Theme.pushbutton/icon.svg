<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Split card: left dark, right light -->
<rect x="2" y="2" width="60" height="60" rx="8" fill="#EEF2F7"/>
<rect x="2" y="2" width="30" height="60" rx="8" fill="#3A5268"/>
<!-- Fix the rounded corner overlap on the split -->
<rect x="28" y="2" width="4" height="60" fill="#3A5268"/>
<!-- Dark side content lines -->
<rect x="7" y="14" width="18" height="3" rx="1.5" fill="#EEF2F7" opacity="0.4"/>
<rect x="7" y="21" width="14" height="2.5" rx="1.2" fill="#EEF2F7" opacity="0.3"/>
<rect x="7" y="28" width="16" height="2.5" rx="1.2" fill="#EEF2F7" opacity="0.2"/>
<!-- Light side content lines -->
<rect x="36" y="14" width="20" height="3" rx="1.5" fill="#3A5268" opacity="0.25"/>
<rect x="36" y="21" width="14" height="2.5" rx="1.2" fill="#3A5268" opacity="0.18"/>
<rect x="36" y="28" width="18" height="2.5" rx="1.2" fill="#3A5268" opacity="0.12"/>
<!-- Orange toggle switch (center divider) -->
<rect x="26" y="38" width="12" height="20" rx="6" fill="#C87A30"/>
<circle cx="32" cy="52" r="5" fill="white"/>
</svg>
