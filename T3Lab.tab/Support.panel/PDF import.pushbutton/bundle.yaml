title: "PDF\nImport"
tooltip: "Import PDF pages into selected Revit views sequentially"
description: |
  Opens a UI to pick a PDF file and select target views.
  Imports each PDF page into the corresponding view in order.
  Supports resolution control (150 / 300 / 600 DPI).
author: "Tran Tien Thanh"
version: "2.0.0"
