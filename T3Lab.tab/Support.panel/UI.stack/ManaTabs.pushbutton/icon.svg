<rect x="2" y="16" width="60" height="46" rx="5" fill="#EEF2F7"/>
<rect x="2" y="16" width="60" height="6" fill="#EEF2F7"/>
<!-- Orange active tab underline -->
<rect x="4" y="14" width="16" height="4" rx="0" fill="#C87A30"/>
<!-- Panel content lines -->
<rect x="8" y="26" width="48" height="5" rx="2.5" fill="#3A5268" opacity="0.7"/>
<rect x="8" y="35" width="36" height="3" rx="1.5" fill="#B0BEC5"/>
<rect x="8" y="42" width="44" height="3" rx="1.5" fill="#CBD5E1"/>
<rect x="8" y="49" width="28" height="3" rx="1.5" fill="#CBD5E1"/>
<!-- Orange accent (active item) -->
<rect x="8" y="35" width="10" height="3" rx="1.5" fill="#C87A30"/>
</svg>
