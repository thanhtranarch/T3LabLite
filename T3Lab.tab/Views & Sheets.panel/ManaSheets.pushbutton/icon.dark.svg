<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Back sheets (stacked) -->
<rect x="8" y="10" width="40" height="52" rx="3" fill="#4A6880" opacity="0.5"/>
<rect x="4" y="6" width="40" height="52" rx="3" fill="#5A7290" opacity="0.6"/>
<!-- Main sheet (front, white) -->
<rect x="10" y="2" width="44" height="54" rx="3" fill="#1A2838"/>
<rect x="10" y="2" width="44" height="54" rx="3" fill="none" stroke="#2E4258" stroke-width="1.5"/>
<!-- Orange corner fold -->
<polygon points="42,2 54,2 54,14" fill="#EAA030"/>
<polygon points="42,2 54,14 42,14" fill="#D08020" opacity="0.7"/>
<!-- Sheet content lines -->
<rect x="14" y="20" width="30" height="3" rx="1.5" fill="#4A6880"/>
<rect x="14" y="26" width="24" height="2" rx="1" fill="#2E4258"/>
<rect x="14" y="31" width="28" height="2" rx="1" fill="#2E4258"/>
<rect x="14" y="36" width="20" height="2" rx="1" fill="#2E4258"/>
<!-- Title block at bottom -->
<rect x="10" y="44" width="44" height="12" rx="2" fill="#7AB0CC"/>
<rect x="13" y="48" width="16" height="2" rx="1" fill="#5A7290"/>
<rect x="13" y="52" width="10" height="2" rx="1" fill="#4A6880"/>
<rect x="42" y="47" width="8" height="7" rx="1" fill="#EAA030"/>
</svg>
