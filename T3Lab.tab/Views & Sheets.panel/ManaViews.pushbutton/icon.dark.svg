<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Back view layers -->
<rect x="2" y="18" width="40" height="30" rx="4" fill="#4A7898"/>
<rect x="6" y="11" width="40" height="30" rx="4" fill="#5A90B8"/>
<!-- Main view (front, white) -->
<rect x="14" y="4" width="48" height="38" rx="4" fill="#1A2838"/>
<!-- Orange active header -->
<rect x="14" y="4" width="48" height="10" rx="4" fill="#EAA030"/>
<rect x="14" y="10" width="48" height="4" fill="#EAA030"/>
<!-- 4-quadrant viewport grid -->
<line x1="38" y1="14" x2="38" y2="42" stroke="#2E4258" stroke-width="2"/>
<line x1="14" y1="28" x2="62" y2="28" stroke="#2E4258" stroke-width="2"/>
<!-- Small view type indicators in each quadrant -->
<rect x="17" y="17" width="18" height="9" rx="2" fill="#243848"/>
<rect x="41" y="17" width="18" height="9" rx="2" fill="#C8D8EB"/>
<rect x="17" y="31" width="18" height="9" rx="2" fill="#B8CCE0"/>
<rect x="41" y="31" width="18" height="9" rx="2" fill="#A8C0D0"/>
<!-- Status bar -->
<rect x="14" y="48" width="48" height="12" rx="4" fill="#7AB0CC"/>
<rect x="18" y="52" width="20" height="3" rx="1.5" fill="#5A7290"/>
<rect x="52" y="52" width="6" height="3" rx="1.5" fill="#EAA030"/>
</svg>
