<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Ribbon bar (dark, top) -->
<rect x="2" y="2" width="60" height="22" rx="5" fill="#3A5268"/>
<!-- 3 panel sections in ribbon -->
<rect x="4" y="4" width="16" height="18" rx="3" fill="#4A6278"/>
<rect x="22" y="4" width="16" height="18" rx="3" fill="#4A6278"/>
<rect x="40" y="4" width="20" height="18" rx="3" fill="#4A6278"/>
<!-- Orange active panel highlight -->
<rect x="22" y="4" width="16" height="18" rx="3" fill="#C87A30" opacity="0.3"/>
<rect x="22" y="20" width="16" height="4" rx="0" fill="#C87A30"/>
<!-- Button icons inside panels (small dots) -->
<rect x="7" y="8" width="10" height="5" rx="1.5" fill="#5A7290" opacity="0.6"/>
<rect x="7" y="15" width="10" height="3" rx="1" fill="#5A7290" opacity="0.4"/>
<rect x="25" y="8" width="10" height="5" rx="1.5" fill="white" opacity="0.7"/>
<rect x="25" y="15" width="10" height="3" rx="1" fill="white" opacity="0.5"/>
<rect x="43" y="8" width="14" height="5" rx="1.5" fill="#5A7290" opacity="0.6"/>
<rect x="43" y="15" width="14" height="3" rx="1" fill="#5A7290" opacity="0.4"/>
<!-- Label editing area (lower half) -->
<rect x="2" y="28" width="60" height="34" rx="5" fill="#EEF2F7"/>
<!-- Editable label lines -->
<rect x="8" y="34" width="48" height="5" rx="2.5" fill="#3A5268" opacity="0.6"/>
<rect x="8" y="43" width="32" height="3.5" rx="1.7" fill="#B0BEC5"/>
<rect x="8" y="50" width="40" height="3.5" rx="1.7" fill="#CBD5E1"/>
<!-- Orange edit cursor -->
<line x1="40" y1="43" x2="40" y2="50" stroke="#C87A30" stroke-width="2" stroke-linecap="round"/>
</svg>
