<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Tab bar background -->
<rect x="2" y="2" width="60" height="14" rx="5" fill="#3A5268"/>
<!-- Individual tabs -->
<rect x="4" y="4" width="16" height="10" rx="4" fill="#C87A30"/>
<rect x="22" y="4" width="14" height="10" rx="4" fill="#566A7A"/>
<rect x="38" y="4" width="14" height="10" rx="4" fill="#566A7A"/>
