title: "Foundation\nVolume"
tooltip: "Write the Revit computed volume into a selected shared parameter on Structural Foundation elements."
description: |
  Reads the built-in HOST_VOLUME_COMPUTED value from all Structural Foundation
  elements and writes it into a user-selected instance parameter.
  Workflow:
  1. Tool collects all writable instance parameters from foundation elements
  2. Search and select the target parameter
  3. Volume values are written in one transaction
author: "Dang Quoc Truong"
version: "1.0.0"
