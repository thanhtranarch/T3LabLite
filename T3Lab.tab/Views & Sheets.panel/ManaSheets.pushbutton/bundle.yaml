title: "Mana\nSheets"
tooltip: "Manage sheets, sync with Excel, place views, create sets, and re-number sheets in one unified interface."
description: |
  Browse and filter sheets with live search
  Sync sheet data to/from Excel
  Place views on sheets at defined locations
